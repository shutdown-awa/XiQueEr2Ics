<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XiQueEr2ICS - 学校订阅</title>
  <link href="styles.css" rel="stylesheet" />
</head>
<body>
  <header class="md3-header">
    <div class="container header-inner">
      <div class="brand">XiQueEr2ICS</div>
    </div>
  </header>

  <main class="container">
    <section class="card search-card" aria-label="搜索学校">
      <input id="searchInput" placeholder="请输入学校代码或名称进行搜索" autocomplete="off" />
    </section>

    <section class="card results-card" aria-label="搜索结果">
      <ul id="results" class="results"></ul>
    </section>

    <div class="help-link">
      <a href="https://blog.hishutdown.cn/?p=201" target="_blank">需要帮助？</a>
    </div>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
